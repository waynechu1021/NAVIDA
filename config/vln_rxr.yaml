# @package _global_

defaults:
  - /habitat: habitat_config_base
  - /habitat/task: vln_r2r
  - /habitat/simulator/agents@habitat.simulator.agents.main_agent: rgbd_agent
  - /habitat/dataset: rxrvlnce_v1
  - /habitat/task/lab_sensors:
    - gps_sensor
    - compass_sensor
  - /habitat/task/measurements/oracle_success@habitat.task.measurements.oracle_success
  - /habitat/task/measurements/ndtw@habitat.task.measurements.ndtw
  - _self_

habitat:
  environment:
    max_episode_steps: 500
    iterator_options:
      max_scene_repeat_steps: 50000
      shuffle: False
  simulator:
    agents:
      main_agent:
        sim_sensors:
          rgb_sensor:
            width: 640
            height: 480
            hfov: 90
    forward_step_size: 0.25
    turn_angle: 15
    habitat_sim_v0:
      gpu_device_id: 0
  task:
    measurements:
      path_length:
        type: PathLength
      distance_to_goal:
        type: DistanceToGoal
        distance_to: POINT
      success:
        type: Success
        success_distance: 3.0
      spl:
        type: SPL
      oracle_success:
        type: OracleSuccess
        success_distance: 3.0
      oracle_navigation_error:
        type: OracleNavigationError
      ndtw:
        type: NDTW
        success_distance: 3.0
        gt_path: /nvme-ssd1/zwy/data/RxR_VLNCE_v0/{split}/{split}_{role}_gt.json.gz
        
        
  dataset:
    type: RxRVLNCE-v1
    split: val_unseen
    roles: [guide]
    languages: ["en-US", "en-IN"]
    scenes_dir: data/scene_dataset/
    data_path: data/RxR_VLNCE_v0/{split}/{split}_{role}.json.gz